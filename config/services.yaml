# config/services.yaml

# -------------------------------
# Paramètres globaux
# -------------------------------
parameters:
    images_directory: '%kernel.project_dir%/public/images'
    app.url: '%env(APP_URL)%'

# -------------------------------
# Services auto-wire
# -------------------------------
services:
    # Auto-wire tous les services de src/
    App\:
        resource: '../src/*'
        exclude: '../src/{DependencyInjection,Entity,Migrations,Tests,Kernel.php}'
        autowire: true
        autoconfigure: true

    App\Service\EmailService:
        arguments:
            $appUrl: '%app.url%'

   

    